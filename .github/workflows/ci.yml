name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev 2>/dev/null || pip install -e ".[dev]" 2>/dev/null || echo "No dev deps found, continuing"

      - name: Lint (ruff)
        run: uv run ruff check . 2>/dev/null || python -m ruff check . 2>/dev/null || echo "ruff not configured, skipping"

      - name: Type check (mypy)
        run: uv run mypy . 2>/dev/null || python -m mypy . 2>/dev/null || echo "mypy not configured, skipping"

      - name: Test (pytest)
        run: uv run pytest 2>/dev/null || python -m pytest 2>/dev/null || echo "No tests found, skipping"
