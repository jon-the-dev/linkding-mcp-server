name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check linkding_mcp_server tests

      - name: Type check (mypy)
        continue-on-error: true
        run: uv run mypy linkding_mcp_server

      - name: Unit and offline integration tests
        run: >
          uv run pytest -m "not performance"
          --cov=linkding_mcp_server
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=90

      - name: Performance baseline
        run: uv run pytest -m performance --durations=10
